name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run scoring engine tests
        run: python -c "
import evez_credit_engine as e
result = e.batch_score(50)
assert result['portfolio_summary']['total_applicants'] == 50
assert 300 <= result['results'][0]['credit_score'] <= 850
assert result['results'][0]['compliance']['ecoa_compliant'] == True
print('All tests passed')
"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t evez-credit-api .
      - name: Verify container starts
        run: |
          docker run -d -p 8080:8080 --name test-api evez-credit-api
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop test-api

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
